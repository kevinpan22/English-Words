<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>验证翻译效果</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f5f5f5; }
        .result { background: white; padding: 15px; margin: 10px 0; border-radius: 8px; }
        .word { font-size: 24px; font-weight: bold; color: #667eea; }
        .meaning { font-size: 18px; color: #2e7d32; margin: 5px 0; }
        .preset { color: #4caf50; font-size: 12px; }
        .api { color: #ff9800; font-size: 12px; }
    </style>
</head>
<body>
    <h1>🧪 快速验证：常用单词翻译</h1>
    <div id="results"></div>
    
    <script src="app.js"></script>
    <script>
        const testWords = [
            'elephant', 'giraffe', 'butterfly', 'computer', 
            'phone', 'mountain', 'beautiful', 'school'
        ];
        
        const resultsDiv = document.getElementById('results');
        
        testWords.forEach(word => {
            const isPreset = commonWordsMeanings[word];
            const meaning = isPreset ? commonWordsMeanings[word] : '（需API查询）';
            
            resultsDiv.innerHTML += `
                <div class="result">
                    <div class="word">${word}</div>
                    <div class="meaning">→ ${meaning}</div>
                    <div class="${isPreset ? 'preset' : 'api'}">
                        ${isPreset ? '✅ 预设词典（瞬时）' : '⏳ 需要API查询'}
                    </div>
                </div>
            `;
        });
    </script>
</body>
</html>
